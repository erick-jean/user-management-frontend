<table
  mat-table
  [dataSource]="dataSource"
  matSort
  (matSortChange)="announceSortChange($event)"
  class="mat-elevation-z8"
>
  @for (column of columns; track column.key) {
    <ng-container [matColumnDef]="column.key.toString()">
      <th
        mat-header-cell
        *matHeaderCellDef
        [mat-sort-header]="column.key.toString()"
        [disabled]="column.sortable === false"
        [sortActionDescription]="'Sort by ' + column.label"
      >
        {{ column.label }}
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        [ngClass]="
          typeof column.cellClass === 'function'
            ? column.cellClass(element[column.key], element)
            : column.cellClass
        "
      >
        {{ column.format ? column.format(element[column.key], element) : element[column.key] }}
      </td>
    </ng-container>
  }
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<mat-paginator
  [pageSizeOptions]="[5, 10, 20]"
  showFirstLastButtons
  aria
  -label="Selecionar página de elementos periódicos "
>
</mat-paginator>
